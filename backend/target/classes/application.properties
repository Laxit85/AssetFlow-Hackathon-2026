spring.datasource.url=jdbc:postgresql://localhost:5432/assetflow
spring.datasource.username=postgres
spring.datasource.password=postgres

# Hackathon speed setting: Hibernate generates/updates the schema from the
# @Entity classes automatically. Swap to Flyway migrations before production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Without this, Spring runs data.sql BEFORE Hibernate creates the tables and the seed insert fails.
spring.jpa.defer-datasource-initialization=true

server.port=8080
